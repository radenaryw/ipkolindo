<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak IPKOLINDO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="lpkolindo.png" alt="Logo">
            <div class="logo-text">
                <h3>IPKOLINDO</h3>
                <span>Ikatan Pelatih Kolintang Indonesia</span>
            </div>
        </div>
        <nav>
            <a href="home.html">Home</a>
            <a href="profile.html">Profile</a>
            <a href="member.html">Member</a>
            <a href="news.html">News</a>
            <a href="kontak.html" class="active">Contact</a>
        </nav>
    </header>

    <main class="container">
        <section class="contact-grid">
            
            <div class="contact-form-section">
                <h1>Hubungi Kami</h1>
                <p class="description">Ada pertanyaan? Kami siap membantu Anda melestarikan budaya Kolintang.</p>
                
                <form id="contactForm" class="minimal-form">
                    <div class="input-group">
                        <input type="text" placeholder="Nama Lengkap" required>
                        <input type="email" placeholder="Email Anda" required>
                    </div>
                    <textarea placeholder="Apa yang ingin Anda sampaikan?" rows="5" required></textarea>
                    <button type="submit" class="btn-send">Kirim Pesan</button>
                </form>
            </div>

            <div class="comment-section">
                <div class="comment-header">
                    <h3>Komentar Terbaru</h3>
                    <span class="badge" id="commentCount">1</span>
                </div>
                
                <div id="commentList" class="comment-list">
                    <div class="comment-card">
                        <div class="avatar">RP</div>
                        <div class="comment-body">
                            <div class="comment-meta">
                                <strong>Rony Pasla</strong>
                                <span>2 jam lalu</span>
                            </div>
                            <p>Sukses selalu untuk seluruh pelatih Kolintang di Indonesia!</p>
                        </div>
                    </div>
                </div>

                <form id="liveCommentForm" class="comment-input-area">
                    <input type="text" id="nameInput" placeholder="Nama..." required>
                    <div class="textarea-wrapper">
                        <textarea id="textInput" placeholder="Tulis komentar publik..." required></textarea>
                        <button type="submit"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </form>
            </div>

        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
